<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#7c5cff">
<title>Timer Pomodoro</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%237c5cff'/%3E%3Ctext x='32' y='44' font-size='34' font-weight='700' fill='white' text-anchor='middle' font-family='system-ui'%3E🍅%3C/text%3E%3C/svg%3E">
<style>
  :root { color-scheme: dark; --bg:#0a0a0f; --pan:#16161f; --bordo:#262633; --txt:#ededf2; --soft:#a0a0b0; --acc:#7c5cff; --acc2:#4d7cff; }
  * { box-sizing: border-box; margin: 0; }
  body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--txt);
    min-height: 100dvh; display: grid; place-items: center; padding: 16px; transition: background .4s; }
  body.pausa { background: #0a0f0d; }
  .timer { width: min(420px, 100%); text-align: center; }
  .fase { display: inline-block; font-size: .82rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
    padding: 6px 14px; border-radius: 999px; background: rgba(124,92,255,.15); color: #c9b9ff; border: 1px solid rgba(124,92,255,.4); }
  body.pausa .fase { background: rgba(46,204,113,.15); color: #7ee2a8; border-color: rgba(46,204,113,.4); }
  .anello { position: relative; width: min(300px, 80vw); aspect-ratio: 1; margin: 28px auto; }
  svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .traccia { fill: none; stroke: var(--bordo); stroke-width: 8; }
  .prog { fill: none; stroke: url(#grad); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
  .tempo { position: absolute; inset: 0; display: grid; place-content: center; }
  .tempo .mmss { font-size: 3.4rem; font-weight: 800; letter-spacing: -.03em; font-variant-numeric: tabular-nums; }
  .tempo .cicli { color: var(--soft); font-size: .9rem; margin-top: 4px; }
  .comandi { display: flex; gap: 12px; justify-content: center; margin-top: 8px; }
  button { font: inherit; cursor: pointer; border-radius: 14px; padding: 14px 26px; font-weight: 700;
    border: 1px solid var(--bordo); background: var(--pan); color: var(--txt); transition: .15s; }
  button:hover { filter: brightness(1.2); }
  button:focus-visible { outline: 2px solid var(--acc); outline-offset: 2px; }
  .vai { background: linear-gradient(135deg,var(--acc),var(--acc2)); border: none; color: #fff; min-width: 130px; }
  .impostazioni { display: flex; gap: 20px; justify-content: center; margin-top: 26px; color: var(--soft); font-size: .9rem; }
  .impostazioni label { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .impostazioni input { width: 70px; text-align: center; background: var(--pan); border: 1px solid var(--bordo);
    border-radius: 10px; color: var(--txt); padding: 8px; font: inherit; }
</style>
</head>
<body>
  <main class="timer">
    <span class="fase" id="fase">Lavoro</span>
    <div class="anello">
      <svg viewBox="0 0 100 100" aria-hidden="true">
        <defs><linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#7c5cff"/><stop offset="1" stop-color="#4d7cff"/>
        </linearGradient></defs>
        <circle class="traccia" cx="50" cy="50" r="44"/>
        <circle class="prog" id="prog" cx="50" cy="50" r="44" pathLength="100" stroke-dasharray="100" stroke-dashoffset="0"/>
      </svg>
      <div class="tempo">
        <div class="mmss" id="mmss" aria-live="polite">25:00</div>
        <div class="cicli" id="cicli">Ciclo 1</div>
      </div>
    </div>
    <div class="comandi">
      <button class="vai" id="avvia">▶ Avvia</button>
      <button id="reset">↺ Reset</button>
    </div>
    <div class="impostazioni">
      <label>Lavoro (min)<input type="number" id="minLavoro" min="1" max="90" value="25"></label>
      <label>Pausa (min)<input type="number" id="minPausa" min="1" max="30" value="5"></label>
    </div>
  </main>

<script>
  let durata = 25 * 60, restante = durata, intervallo = null, inPausa = false, ciclo = 1, attivo = false;
  const elMmss = document.getElementById('mmss');
  const elCicli = document.getElementById('cicli');
  const elFase = document.getElementById('fase');
  const elProg = document.getElementById('prog');
  const elAvvia = document.getElementById('avvia');

  const minLavoro = document.getElementById('minLavoro');
  const minPausa = document.getElementById('minPausa');

  function formatta(s) {
    const m = Math.floor(s / 60), sec = s % 60;
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }
  function disegna() {
    elMmss.textContent = formatta(restante);
    elProg.style.strokeDashoffset = 100 - (restante / durata) * 100;
    elCicli.textContent = `Ciclo ${ciclo}`;
    elFase.textContent = inPausa ? 'Pausa' : 'Lavoro';
    document.body.classList.toggle('pausa', inPausa);
    document.title = `${formatta(restante)} · ${inPausa ? 'Pausa' : 'Lavoro'}`;
  }
  function tick() {
    if (restante > 0) { restante--; disegna(); return; }
    suona();
    // Passa alla fase successiva.
    if (inPausa) { ciclo++; inPausa = false; durata = (+minLavoro.value || 25) * 60; }
    else { inPausa = true; durata = (+minPausa.value || 5) * 60; }
    restante = durata; disegna();
  }
  function avviaPausaToggle() {
    if (attivo) { clearInterval(intervallo); attivo = false; elAvvia.textContent = '▶ Riprendi'; }
    else { sblocca(); intervallo = setInterval(tick, 1000); attivo = true; elAvvia.textContent = '⏸ Pausa'; }
  }
  function reset() {
    clearInterval(intervallo); attivo = false; inPausa = false; ciclo = 1;
    durata = (+minLavoro.value || 25) * 60; restante = durata;
    elAvvia.textContent = '▶ Avvia'; disegna();
  }

  // --- Suono di fine sessione (Web Audio, nessun file esterno) ---
  let audioCtx = null;
  function sblocca() { if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch {} } }
  function suona() {
    if (!audioCtx) return;
    [0, 0.18, 0.36].forEach((t) => {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = 'sine'; o.frequency.value = inPausa ? 660 : 880;
      o.connect(g); g.connect(audioCtx.destination);
      const ora = audioCtx.currentTime + t;
      g.gain.setValueAtTime(0.0001, ora);
      g.gain.exponentialRampToValueAtTime(0.3, ora + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, ora + 0.15);
      o.start(ora); o.stop(ora + 0.16);
    });
    if (navigator.vibrate) navigator.vibrate([120, 60, 120]);
  }

  elAvvia.addEventListener('click', avviaPausaToggle);
  document.getElementById('reset').addEventListener('click', reset);
  minLavoro.addEventListener('change', () => { if (!attivo && !inPausa) reset(); });
  minPausa.addEventListener('change', () => { if (!attivo && inPausa) reset(); });

  disegna();
</script>
</body>
</html>
