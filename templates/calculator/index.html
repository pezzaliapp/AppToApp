<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#7c5cff">
<title>Calcolatrice</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%237c5cff'/%3E%3Ctext x='32' y='44' font-size='34' font-weight='700' fill='white' text-anchor='middle' font-family='system-ui'%3E🧮%3C/text%3E%3C/svg%3E">
<style>
  :root { color-scheme: dark; --bg:#0a0a0f; --pan:#16161f; --bordo:#262633; --txt:#ededf2; --soft:#a0a0b0; --acc:#7c5cff; }
  * { box-sizing: border-box; margin: 0; }
  body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--txt);
    min-height: 100dvh; display: grid; place-items: center; padding: 16px; }
  .calc { width: min(360px, 100%); background: var(--pan); border: 1px solid var(--bordo);
    border-radius: 22px; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,.5); }
  h1 { font-size: 1rem; color: var(--soft); font-weight: 600; margin-bottom: 12px; }
  .display { background: #0d0d14; border: 1px solid var(--bordo); border-radius: 14px;
    padding: 18px; text-align: right; margin-bottom: 14px; }
  .operazione { color: var(--soft); font-size: .9rem; min-height: 1.2em; overflow: hidden; }
  .risultato { font-size: 2.4rem; font-weight: 700; letter-spacing: -.02em; overflow-x: auto; }
  .tasti { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  button { font: inherit; cursor: pointer; border: none; border-radius: 14px; padding: 18px 0;
    font-size: 1.2rem; font-weight: 600; color: var(--txt); background: #20202c;
    transition: transform .08s, filter .15s; }
  button:hover { filter: brightness(1.2); }
  button:active { transform: scale(.95); }
  button:focus-visible { outline: 2px solid var(--acc); outline-offset: 2px; }
  .op { background: #2a2440; color: #c9b9ff; }
  .uguale { background: linear-gradient(135deg,#7c5cff,#4d7cff); color: #fff; grid-column: span 2; }
  .funz { background: #1c1c28; color: var(--soft); font-size: 1rem; }
</style>
</head>
<body>
  <main class="calc">
    <h1>Calcolatrice</h1>
    <div class="display">
      <div class="operazione" id="operazione" aria-hidden="true"></div>
      <output class="risultato" id="risultato" aria-live="polite">0</output>
    </div>
    <div class="tasti">
      <button class="funz" data-azione="clear">AC</button>
      <button class="funz" data-azione="segno">±</button>
      <button class="funz" data-azione="percento">%</button>
      <button class="op" data-op="/">÷</button>

      <button data-num="7">7</button>
      <button data-num="8">8</button>
      <button data-num="9">9</button>
      <button class="op" data-op="*">×</button>

      <button data-num="4">4</button>
      <button data-num="5">5</button>
      <button data-num="6">6</button>
      <button class="op" data-op="-">−</button>

      <button data-num="1">1</button>
      <button data-num="2">2</button>
      <button data-num="3">3</button>
      <button class="op" data-op="+">+</button>

      <button data-num="0" style="grid-column: span 2">0</button>
      <button data-num=".">,</button>
      <button class="uguale" data-azione="uguale">=</button>
    </div>
  </main>

<script>
  // Stato della calcolatrice.
  let corrente = '0', precedente = null, operatore = null, azzeraAllaCifra = false;
  const elRis = document.getElementById('risultato');
  const elOp = document.getElementById('operazione');

  const formatta = (n) => {
    const num = Number(n);
    if (!isFinite(num)) return 'Errore';
    return num.toLocaleString('it-IT', { maximumFractionDigits: 8 });
  };
  const aggiorna = () => {
    elRis.textContent = corrente === '' ? '0' : formatta(corrente.replace(',', '.')) ;
    elOp.textContent = precedente !== null ? `${formatta(precedente)} ${simbolo(operatore)}` : '';
  };
  const simbolo = (o) => ({ '+':'+','-':'−','*':'×','/':'÷' })[o] || '';

  function inserisciCifra(c) {
    if (azzeraAllaCifra) { corrente = ''; azzeraAllaCifra = false; }
    if (c === '.' && corrente.includes('.')) return;
    if (corrente === '0' && c !== '.') corrente = '';
    corrente += c;
    aggiorna();
  }
  function calcola() {
    const a = parseFloat(precedente), b = parseFloat(corrente.replace(',', '.'));
    let r = b;
    if (operatore === '+') r = a + b;
    if (operatore === '-') r = a - b;
    if (operatore === '*') r = a * b;
    if (operatore === '/') r = b === 0 ? NaN : a / b;
    return r;
  }
  function impostaOperatore(op) {
    if (operatore && !azzeraAllaCifra) { precedente = calcola(); }
    else { precedente = parseFloat(corrente.replace(',', '.')); }
    operatore = op; azzeraAllaCifra = true; aggiorna();
  }

  document.querySelector('.tasti').addEventListener('click', (e) => {
    const b = e.target.closest('button'); if (!b) return;
    if (b.dataset.num !== undefined) return inserisciCifra(b.dataset.num);
    if (b.dataset.op) return impostaOperatore(b.dataset.op);
    const az = b.dataset.azione;
    if (az === 'clear') { corrente = '0'; precedente = null; operatore = null; }
    if (az === 'segno') { corrente = String(parseFloat(corrente.replace(',', '.')) * -1); }
    if (az === 'percento') { corrente = String(parseFloat(corrente.replace(',', '.')) / 100); }
    if (az === 'uguale' && operatore !== null) {
      corrente = String(calcola()); precedente = null; operatore = null; azzeraAllaCifra = true;
    }
    aggiorna();
  });

  // Supporto tastiera.
  window.addEventListener('keydown', (e) => {
    if (/[0-9]/.test(e.key)) inserisciCifra(e.key);
    else if (e.key === '.' || e.key === ',') inserisciCifra('.');
    else if (['+','-','*','/'].includes(e.key)) impostaOperatore(e.key);
    else if (e.key === 'Enter' || e.key === '=') { if (operatore) { corrente = String(calcola()); precedente = null; operatore = null; azzeraAllaCifra = true; aggiorna(); } }
    else if (e.key === 'Escape') { corrente = '0'; precedente = null; operatore = null; aggiorna(); }
    else if (e.key === 'Backspace') { corrente = corrente.slice(0, -1) || '0'; aggiorna(); }
  });

  aggiorna();
</script>
</body>
</html>
